<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FFB8C6" />
    <title>宝宝成长记录</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👶</text></svg>" />
    <!-- LXGW WenKai 霞鹜文楷 — 开源手写体，从国内 CDN（jsDelivr）加载 -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css"></noscript>
    <style>
      #splash { position:fixed; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#FFF5F5; font-family:-apple-system,'PingFang SC',sans-serif; z-index:9999; }
      #splash .emoji { font-size:48px; margin-bottom:12px; }
      #splash .title { color:#FF8FA3; font-size:18px; font-weight:600; }
      #splash .bar { width:100px; height:3px; background:#FFE0E8; border-radius:4px; margin-top:12px; overflow:hidden; }
      #splash .bar-inner { width:25%; height:100%; background:#FFB8C6; border-radius:4px; animation:slide 1s ease-in-out infinite; }
      @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }
    </style>
    <!-- 全部使用系统字体（Google Fonts 在中国被墙，不依赖外部资源）-->
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <div class="emoji">👶</div>
        <div class="title">宝宝成长记录</div>
        <div class="bar"><div class="bar-inner"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
